{% comment %}
Card Component

Usage:
{% include "components/card.html" with title="Card Title" %}
  <p>Card content here</p>
{% endinclude %}

Parameters:
- title: card title
- extra_classes: additional CSS classes
{% endcomment %}

<div class="card {{ extra_classes }}">
  {% if title %}
  <div class="card-header">
    <h3 class="card-title">{{ title }}</h3>
  </div>
  {% endif %}

  <div class="card-body">
    {{ card_content|safe }}
  </div>
</div>
